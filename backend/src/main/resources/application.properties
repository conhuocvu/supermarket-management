spring.application.name=${SPRING_APPLICATION_NAME:backend}
server.port=${SERVER_PORT:8080}

# DataSource Configuration (Defaults to H2 for instant local testing, overridden by DB_URL in environment)
spring.datasource.url=${DB_URL:jdbc:h2:mem:supermarketdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
