spring.application.name=${SPRING_APPLICATION_NAME:backend}
server.port=${SERVER_PORT:8080}

# DataSource Configuration (Strict Database connection, no H2 fallback)
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=${DB_DRIVER}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=3

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update

# Supabase Storage Configuration
supabase.url=${SUPABASE_URL}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:product-images}
supabase.storage.avatar-bucket=${SUPABASE_AVATAR_BUCKET:avatars}

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
